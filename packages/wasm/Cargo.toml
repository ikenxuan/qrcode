[package]
name = "qrcode-wasm"
version = "1.3.0"
edition = "2021"
license = "MIT"

[lib]
crate-type = ["cdylib"]

[dependencies]
wasm-bindgen = "0.2.122"
serde = { version = "1.0.228", features = ["derive"] }
serde-wasm-bindgen = "0.6.5"
qr-code-styling = "0.1.1"
resvg = "0.47.0"
image = { version = "0.25.10", default-features = false, features = ["png", "jpeg", "webp"] }
rxing = { version = "0.9.0", default-features = false, features = ["wasm_support", "encoding_rs", "qrcode", "decoders"] }

[profile.release]
lto = true
opt-level = "z"
strip = true
codegen-units = 1

[package.metadata.wasm-pack.profile.release]
wasm-opt = false
